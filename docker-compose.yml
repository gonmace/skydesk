services:
  postgres:
    profiles: [postgres]
    image: postgres:17-alpine
    container_name: ${PROJECT_NAME}_db
    env_file:
      - .env
    volumes:
      - ./db:/var/lib/postgresql/data/
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ${PROJECT_NAME}_redis
    restart: always
    # AOF + volumen: sesiones, lockouts de axes y cache sobreviven a restarts
    command: redis-server --appendonly yes
    volumes:
      - ./volumes/redis:/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  django:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${PROJECT_NAME}_app
    restart: always
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres  # dentro de Docker el hostname es el nombre del servicio
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
    ports:
      - "127.0.0.1:${APP_PORT:-8000}:8000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app_network
    healthcheck:
      # Cualquier respuesta HTTP < 500 vale (un 400 por Host header también prueba que
      # gunicorn atiende). Sin curl en python:slim — se usa la stdlib.
      test: ["CMD-SHELL", "python -c \"import http.client; c=http.client.HTTPConnection('localhost', 8000, timeout=5); c.request('GET', '/robots.txt'); exit(0 if c.getresponse().status < 500 else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  n8n:
    profiles: [n8n]
    build:
      context: .
      dockerfile: docker/n8n.Dockerfile
    image: ${PROJECT_NAME}_n8n:latest
    container_name: ${PROJECT_NAME}_n8n
    restart: always
    ports:
      - "127.0.0.1:${N8N_PORT:-8001}:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: ${POSTGRES_HOST:-postgres}
      DB_POSTGRESDB_PORT: ${POSTGRES_PORT:-5432}
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      GENERIC_TIMEZONE: ${TIME_ZONE:-America/La_Paz}
      N8N_HOST: ${N8N_DOMAIN}
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      N8N_EDITOR_BASE_URL: https://${N8N_DOMAIN}/
      WEBHOOK_URL: https://${N8N_DOMAIN}/
      N8N_IMPORT_ACTIVE: "true"
      N8N_TRUST_PROXY: "true"
      N8N_PROXY_HOPS: "1"
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_LOG_LEVEL: warn
      OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS: "false"
    volumes:
      - ./volumes/n8n:/home/node/.n8n
      - ./n8n/workflows:/home/node/.n8n/workflows-import:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
        required: false   # se ignora si el profile "postgres" no está activo (modo host)
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  n8n-mcp:
    profiles: [n8n-mcp]
    image: ghcr.io/czlonkowski/n8n-mcp:latest
    container_name: ${PROJECT_NAME}_n8n_mcp
    restart: always
    environment:
      N8N_API_URL: http://n8n:5678
      N8N_API_KEY: ${N8N_API_KEY}
      AUTH_TOKEN: ${N8N_MCP_AUTH_TOKEN}
      MCP_MODE: http
    ports:
      - "127.0.0.1:${N8N_MCP_PORT:-8002}:3000"
    depends_on:
      n8n:
        condition: service_healthy
    networks:
      - app_network

networks:
  app_network:
