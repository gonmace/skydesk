# --- Django app ---
server {
    listen 80;
    server_name {{DOMAIN}};

    # ATTACHMENT_MAX_SIZE (20M) + margen para el overhead multipart — si fueran iguales,
    # un archivo legítimo de 20M moriría en nginx con un 413 pelado en vez del mensaje
    # de validación de la app.
    client_max_body_size 25M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss image/svg+xml;

    location /static/ {
        alias {{PROJECT_DIR}}/staticfiles/;
        expires 365d;
        add_header Cache-Control "public, immutable";
        # Sirve archivos .gz pre-generados por Whitenoise (ManifestStaticFilesStorage)
        gzip_static on;
    }

    # Sin location /media/: los adjuntos NUNCA se sirven por Nginx directo — todos pasan
    # por tickets:attachment_serve (chequea permisos por ticket). Los backends de
    # almacenamiento (nextcloud/local) viven fuera de MEDIA_ROOT a propósito, ver
    # attachments/backends/local.py.

    # Tiempo real (Django Channels). Sin este bloque el handshake WS falla (400/502) pero
    # el resto de la app sigue funcionando normal por HTTP — el cliente (static/js/live.js)
    # degrada en silencio si no logra conectar.
    location /ws/ {
        proxy_pass http://127.0.0.1:{{APP_PORT}};
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    location / {
        proxy_pass http://127.0.0.1:{{APP_PORT}};
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
