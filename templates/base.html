<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}Mi Proyecto{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}{% endblock %}">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ request.build_absolute_uri }}">
    <meta property="og:title" content="{% block og_title %}{% block title_og %}Mi Proyecto{% endblock %}{% endblock %}">
    <meta property="og:description" content="{% block og_description %}{% endblock %}">
    <meta property="og:image" content="{% block og_image %}{% endblock %}">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{% block twitter_title %}{% endblock %}">
    <meta name="twitter:description" content="{% block twitter_description %}{% endblock %}">

    {% load static tailwind_tags %}
    <link rel="icon" type="image/svg+xml" href="{% static 'img/favicon.svg' %}">
    {% tailwind_css %}
    {% block extra_head %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}

    {% block extra_scripts %}{% endblock %}

    {% if debug %}
        {% url 'django_browser_reload:reload' as reload_url %}
        <script src="{{ reload_url }}" defer></script>
    {% endif %}
</body>
</html>
