{% if page_obj.paginator.num_pages > 1 %}
<div class="flex items-center justify-center gap-3 mt-5">
  {% if page_obj.has_previous %}
    <a href="{% querystring page=page_obj.previous_page_number %}" class="btn btn-ghost btn-sm">← Anterior</a>
  {% endif %}
  <span class="text-sm text-base-content/60">Página {{ page_obj.number }} / {{ page_obj.paginator.num_pages }}</span>
  {% if page_obj.has_next %}
    <a href="{% querystring page=page_obj.next_page_number %}" class="btn btn-ghost btn-sm">Siguiente →</a>
  {% endif %}
</div>
{% endif %}
